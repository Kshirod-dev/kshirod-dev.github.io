<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kshirod | Developer</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
}

/* HERO */
header {
    padding: 80px 20px;
}

h1 {
    font-size: 42px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    -webkit-background-clip: text;
    color: transparent;
}

p {
    color: #94a3b8;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 28px;
    border-radius: 30px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #3b82f6;
}

/* SECTIONS */
section {
    padding: 60px 20px;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    margin: 15px auto;
    padding: 20px;
    border-radius: 15px;
    width: 85%;
    max-width: 400px;
    transition: 0.3s;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(59,130,246,0.5);
}

/* INPUT */
input {
    padding: 10px;
    width: 80%;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

/* FADE ANIMATION */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<header class="fade">
    <h1>Hi, I'm Kshirod 👋</h1>
    <p>I build modern websites & digital solutions</p>
    <a href="#contact" class="btn">Hire Me</a>
</header>

<section class="fade">
    <h2>My Services</h2>

    <div class="card" onclick="scrollToContact()">🌐 Website Development</div>
    <div class="card" onclick="scrollToContact()">💌 Wedding Card Printing & Design</div>
    <div class="card" onclick="scrollToContact()">🎨 Logo, Poster & Digital Work</div>
</section>

<section class="fade">
    <h2>Other Digital Work</h2>

    <div class="card" style="cursor:default;">
        <input type="text" id="workType" placeholder="Type your work"><br>
        <input type="file"><br>
        <button class="btn" onclick="sendWork()">Send on WhatsApp</button>
    </div>
</section>

<section class="fade">
    <h2>Printing Service</h2>

    <div class="card" style="cursor:default;">
        <input type="file"><br>
        <input type="number" id="copies" placeholder="Copies needed"><br>
        <button class="btn" onclick="sendPrint()">Send Request</button>
    </div>
</section>

<section id="contact" class="fade">
    <h2>Contact Me</h2>
    <a href="https://wa.me/918637223653" class="btn">Chat on WhatsApp</a>
    <p>📍 Bhubaneswar, India</p>
</section>

<script>
function scrollToContact() {
    document.getElementById("contact").scrollIntoView({ behavior: "smooth" });
}

function sendWork() {
    let type = document.getElementById("workType").value;
    let msg = `Hello, I need this work:\nType: ${type}\nI will send file after this.`;
    window.open(`https://wa.me/918637223653?text=${encodeURIComponent(msg)}`);
}

function sendPrint() {
    let copies = document.getElementById("copies").value;
    let msg = `Hello, I need printing service:\nCopies: ${copies}\nI will send file after this.`;
    window.open(`https://wa.me/918637223653?text=${encodeURIComponent(msg)}`);
}

/* FADE-IN ON SCROLL */
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
    faders.forEach(el => {
        const rect = el.getBoundingClientRect().top;
        if (rect < window.innerHeight - 50) {
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
